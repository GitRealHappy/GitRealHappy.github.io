title: "Oakmoss Wood Art"
description: "Handcrafted wood art by Jesse James Carver"
baseurl: ""
url: "https://gitrealHappy.github.io"

# Author information
author:
  name: "Jesse James Carver"
  email: "jesse.boyes@oakmosswoodcraft.com"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  gallery:
    output: true
    permalink: /gallery/:name/

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# SEO and social media
twitter:
  username: oakmoss
facebook:
  app_id: 3827372067482851

# Default front matter
defaults:
  - scope:
      path: ""
      type: "gallery"
    values:
      layout: "gallery"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
